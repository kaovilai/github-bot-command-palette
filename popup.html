<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff; --bg2: #f6f8fa; --border: #d0d7de; --text: #1f2328;
      --text-muted: #656d76; --primary: #0969da; --success: #1a7f37;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #e6edf3;
        --text-muted: #8b949e; --primary: #58a6ff; --success: #3fb950;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); width: 320px; padding: 12px;
    }
    .header { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .header h1 { font-size: 14px; }
    .header .icon { font-size: 18px; }
    .repo-info {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; margin-bottom: 10px; font-size: 13px;
    }
    .repo-name { font-weight: 600; font-family: monospace; }
    .no-pr { color: var(--text-muted); font-style: italic; font-size: 12px; }
    .profile-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .profile-item:last-child { border-bottom: none; }
    .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: var(--border); border-radius: 9px;
      cursor: pointer; transition: 0.2s;
    }
    .toggle .slider::before {
      content: ''; position: absolute; height: 12px; width: 12px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .slider { background: var(--primary); }
    .toggle input:checked + .slider::before { transform: translateX(14px); }
    .cmd-preview { margin-top: 10px; }
    .cmd-preview h3 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .cmd-list { display: flex; flex-wrap: wrap; gap: 3px; }
    .cmd-tag {
      display: inline-block; padding: 2px 6px; font-size: 11px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
      font-family: monospace;
    }
    .footer {
      margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer a { font-size: 12px; color: var(--primary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">&#129302;</span>
    <h1>Bot Command Palette</h1>
  </div>
  <div id="content">
    <div class="repo-info">
      <span class="no-pr">Detecting current page...</span>
    </div>
  </div>
  <div class="footer">
    <a href="#" id="open-settings">Open Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
